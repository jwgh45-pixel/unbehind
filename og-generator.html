<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<title>Unbehind OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0B;
    --ink: #F5F5F4;
    --ink-mute: #7A7A77;
    --grad-1: #A78BFA;
    --grad-2: #F0ABA1;
    --grad-3: #7DD3C0;
  }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', -apple-system, sans-serif;
    position: relative;
    overflow: hidden;
    letter-spacing: -0.005em;
  }

  body::before {
    content: '';
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(ellipse 50% 45% at 25% 30%, rgba(167, 139, 250, 0.30), transparent 70%),
      radial-gradient(ellipse 45% 40% at 75% 45%, rgba(240, 171, 161, 0.24), transparent 70%),
      radial-gradient(ellipse 55% 40% at 50% 85%, rgba(125, 211, 192, 0.18), transparent 70%);
    filter: blur(40px);
  }

  .frame {
    position: absolute;
    inset: 40px;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .top-left {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Geist Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: var(--ink);
    padding: 8px 16px 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.03);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--grad-2);
    box-shadow: 0 0 12px var(--grad-2);
  }

  .wordmark {
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.015em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .wordmark::before {
    content: '';
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-1));
  }

  .headline {
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    font-size: 78px;
    line-height: 1.02;
    letter-spacing: -0.032em;
    color: var(--ink);
    max-width: 18ch;
  }
  .headline .grad {
    background: linear-gradient(110deg, var(--grad-1) 0%, var(--grad-2) 50%, var(--grad-3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-style: italic;
    font-weight: 400;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .prices {
    display: flex;
    gap: 28px;
    font-family: 'Geist Mono', monospace;
    font-size: 15px;
    color: var(--ink-mute);
  }
  .prices strong { color: var(--ink); font-weight: 500; }
  .prices span { display: flex; gap: 6px; }

  .url {
    font-family: 'Geist Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: var(--ink-mute);
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-row">
      <div class="top-left">
        <div class="dot"></div>
        <span>For seed-stage founders</span>
      </div>
      <div class="wordmark">Unbehind</div>
    </div>

    <div>
      <div class="headline">You don't need an AI <span class="grad">strategy</span>. You need a <span class="grad">Thursday afternoon</span>.</div>
    </div>

    <div class="bottom-row">
      <div class="prices">
        <span><strong>£750</strong> Audit</span>
        <span><strong>£3,500</strong> Set-Up</span>
        <span><strong>£1,500</strong>/mo</span>
      </div>
      <div class="url">unbehind.ai</div>
    </div>
  </div>
</body>
</html>
